services:
  - type: web
    name: babu-clinic
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn babuclinic.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: babuclinic.settings
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: FIREBASE_CREDENTIALS_PATH
        value: firebase-credentials.json
    autoDeploy: true
